<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Infratuzilma: 0 dan Pro gacha</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fredoka Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Fredoka', 'sans-serif'],
                    },
                    colors: {
                        dark: '#0f172a',
                        darker: '#0b1120',
                        primary: '#3b82f6',
                        secondary: '#10b981',
                        terminal: '#1e1e1e',
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Fredoka', sans-serif; background-color: #0f172a; color: #e2e8f0; overflow: hidden; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        /* Animations */
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide-in { animation: slideIn 0.4s ease-out forwards; }
        
        @keyframes movePacket {
            0% { left: 0%; opacity: 1; transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { left: 80%; opacity: 0; transform: scale(1); }
        }
        .sim-packet { position: absolute; animation: movePacket 3s infinite linear; }

        @keyframes pulse-border {
            0% { border-color: rgba(59, 130, 246, 0.5); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); }
            70% { border-color: rgba(59, 130, 246, 1); box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); }
            100% { border-color: rgba(59, 130, 246, 0.5); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }
        .animate-pulse-border { animation: pulse-border 2s infinite; }

        /* Terminal typing effect */
        .typewriter text {
            overflow: hidden; white-space: nowrap; margin: 0 auto;
            border-right: .15em solid orange;
            animation: typing 3.5s steps(40, end), blink-caret .75s step-end infinite;
        }

        .code-block { font-family: 'Courier New', Courier, monospace; }
        
        /* Interactive Elements */
        .btn-sim { transition: all 0.2s; }
        .btn-sim:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); }
        .btn-sim:active { transform: translateY(0); }
    </style>
</head>
<body class="h-screen flex flex-col md:flex-row antialiased selection:bg-primary selection:text-white">

    <!-- Sidebar -->
    <aside class="w-full md:w-80 bg-darker border-r border-slate-800 flex flex-col h-1/3 md:h-screen transition-all z-20">
        <div class="p-4 border-b border-slate-800 bg-darker sticky top-0">
            <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent flex items-center gap-2">
                <i class="fas fa-server"></i> IT Infratuzilma
            </h1>
            <p class="text-slate-400 text-sm mt-1">23 ta asosiy texnologiya</p>
        </div>
        <div class="flex-1 overflow-y-auto p-2 space-y-1" id="sidebar-menu">
            <!-- Menus will be generated here -->
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 h-2/3 md:h-screen flex flex-col relative overflow-hidden bg-dark">
        
        <!-- Header -->
        <header class="p-6 border-b border-slate-800 bg-dark/50 backdrop-blur z-10">
            <h2 id="topic-title" class="text-3xl font-bold text-white mb-4 animate-slide-in">Yuklanmoqda...</h2>
            
            <!-- Tabs -->
            <div class="flex space-x-2 bg-slate-800/50 p-1 rounded-lg w-max" id="tabs-container">
                <button onclick="switchTab('theory')" id="tab-theory" class="px-4 py-2 rounded-md text-sm font-medium transition-all bg-primary text-white shadow"><i class="fas fa-book mr-2"></i>Nazariya</button>
                <button onclick="switchTab('practice')" id="tab-practice" class="px-4 py-2 rounded-md text-sm font-medium transition-all text-slate-400 hover:text-white hover:bg-slate-700"><i class="fas fa-terminal mr-2"></i>Amaliyot</button>
                <button onclick="switchTab('simulation')" id="tab-simulation" class="px-4 py-2 rounded-md text-sm font-medium transition-all text-slate-400 hover:text-white hover:bg-slate-700"><i class="fas fa-gamepad mr-2"></i>Simulyatsiya</button>
            </div>
        </header>

        <!-- Content Area -->
        <div class="flex-1 overflow-y-auto p-6 scroll-smooth" id="content-area">
            <!-- Dynamic Content goes here -->
        </div>

        <!-- Footer Navigation -->
        <footer class="p-4 border-t border-slate-800 flex justify-between items-center bg-darker mt-auto z-10">
            <button onclick="prevTopic()" class="px-4 py-2 rounded bg-slate-800 hover:bg-slate-700 transition text-sm flex items-center gap-2">
                <i class="fas fa-chevron-left"></i> Oldingi
            </button>
            <span id="topic-counter" class="text-slate-500 font-mono">1 / 23</span>
            <button onclick="nextTopic()" class="px-4 py-2 rounded bg-primary hover:bg-blue-600 transition text-sm flex items-center gap-2">
                Keyingi <i class="fas fa-chevron-right"></i>
            </button>
        </footer>
    </main>

    <script>
        // Data Structure for all 23 topics
        const topics = [
            {
                id: 1, title: "1. Protocol (Protokol)", icon: "fa-handshake",
                theory: `
                    <h3 class="text-xl font-bold text-blue-400 mb-2">Protokol o'zi nima?</h3>
                    <p class="mb-4 text-slate-300 leading-relaxed">Tasavvur qiling, ikki kishi gaplashmoqchi. Biri yaponcha, ikkinchisi ispancha gapirsa, ular bir-birini tushunmaydi. Aloqa o'rnatish uchun ular umumiy qoidalarga (masalan, ikkisi ham inglizcha gapirishi) kelishib olishi kerak. <strong>Protokol</strong> kompyuter tarmoqlarida aynan shunday "umumiy til" va qoidalar to'plamidir.</p>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-6">
                        <div class="bg-slate-800 p-4 rounded-lg border border-slate-700">
                            <h4 class="text-emerald-400 font-bold mb-2">OSI Modeli (7 qatlam)</h4>
                            <p class="text-sm text-slate-400">Protokollar qatlamlarga bo'linadi. Jismoniy kabellardan (Layer 1) tortib, ilovalargacha (Layer 7 - HTTP, FTP).</p>
                        </div>
                        <div class="bg-slate-800 p-4 rounded-lg border border-slate-700">
                            <h4 class="text-emerald-400 font-bold mb-2">TCP/IP Modeli</h4>
                            <p class="text-sm text-slate-400">Zamonaviy internetning asosi. Ma'lumotlarni paketlarga bo'lib manzilga ishonchli (TCP) yoki tez (UDP) yetkazish.</p>
                        </div>
                    </div>
                `,
                practice: `
                    <p class="mb-4 text-slate-300">Terminalda protokollarni tekshirish (ICMP protokoli orqali ping yuborish):</p>
                    <div class="bg-terminal p-4 rounded-lg shadow-lg font-mono text-sm">
                        <span class="text-green-400">user@ubuntu:~$</span> ping google.com<br>
                        <span class="text-slate-300">PING google.com (142.250.190.46) 56(84) bytes of data.</span><br>
                        <span class="text-slate-300">64 bytes from 142.250.190.46: icmp_seq=1 ttl=115 time=14.2 ms</span><br>
                        <br>
                        <span class="text-slate-500"># Bu yerda ICMP (Internet Control Message Protocol) ishlamoqda.</span>
                    </div>
                `,
                simFunc: () => {
                    return `
                    <div class="flex flex-col items-center justify-center h-full">
                        <h3 class="text-xl mb-8 text-center">Kompyuterlar bir-birini tushunishi uchun to'g'ri protokolni tanlang</h3>
                        <div class="flex justify-between items-center w-full max-w-2xl bg-slate-800 p-8 rounded-xl relative">
                            <div class="text-center z-10">
                                <i class="fas fa-desktop text-6xl text-blue-400 mb-2"></i>
                                <p>Kompyuter A</p>
                            </div>
                            
                            <div class="flex flex-col gap-2 z-10 w-48">
                                <button onclick="simProtocol('wrong')" class="bg-red-500/20 text-red-400 border border-red-500 py-2 rounded hover:bg-red-500/40 transition">Xato Til (Abra-kadabra)</button>
                                <button onclick="simProtocol('tcp')" class="bg-green-500/20 text-green-400 border border-green-500 py-2 rounded hover:bg-green-500/40 transition">TCP/IP (Standart)</button>
                            </div>

                            <div class="text-center z-10">
                                <i class="fas fa-server text-6xl text-purple-400 mb-2"></i>
                                <p>Server B</p>
                            </div>

                            <!-- Animated lines -->
                            <div id="protocol-line" class="absolute top-1/2 left-24 right-24 h-1 bg-slate-600 -translate-y-1/2"></div>
                            <div id="protocol-packet" class="absolute top-1/2 left-24 w-6 h-6 bg-yellow-400 rounded-full -translate-y-1/2 shadow-[0_0_15px_rgba(250,204,21,0.6)] hidden transition-all duration-1000"></div>
                        </div>
                        <div id="protocol-result" class="mt-8 text-xl font-bold h-8"></div>
                    </div>
                    `;
                }
            },
            {
                id: 2, title: "2. HTTPS", icon: "fa-lock",
                theory: `
                    <h3 class="text-xl font-bold text-blue-400 mb-2">HTTPS (Hypertext Transfer Protocol Secure)</h3>
                    <p class="mb-4 text-slate-300">Internetda ma'lumot almashishning xavfsiz shakli. Siz kiritgan parol, kredit karta raqamlari xakerlar tomonidan yo'lda ushlanib qolmasligi uchun <strong>shifrlanadi (Encryption)</strong>.</p>
                    <ul class="list-disc pl-5 space-y-2 text-slate-300">
                        <li><strong>SSL/TLS:</strong> Ma'lumotni shifrlaydigan sertifikatlar.</li>
                        <li><strong>Asimmetrik shifrlash:</strong> Ulanish o'rnatilayotganda ochiq (Public) va yopiq (Private) kalitlardan foydalaniladi.</li>
                        <li><strong>Port:</strong> Odatda 443-portda ishlaydi.</li>
                    </ul>
                `,
                practice: `
                    <p class="mb-4 text-slate-300">Saytning SSL sertifikatini curl orqali tekshirish:</p>
                    <div class="bg-terminal p-4 rounded-lg shadow-lg font-mono text-sm code-block">
                        <span class="text-green-400">user@ubuntu:~$</span> curl -Iv https://google.com<br>
                        <span class="text-slate-400">* subject: CN=*.google.com</span><br>
                        <span class="text-slate-400">* start date: Aug  7 08:26:22 2023 GMT</span><br>
                        <span class="text-slate-400">* expire date: Oct 30 08:26:21 2023 GMT</span><br>
                        <span class="text-emerald-400">* SSL connection using TLSv1.3 / AEAD-CHACHA20-POLY1305-SHA256</span>
                    </div>
                `,
                simFunc: () => {
                    return `
                    <div class="flex flex-col items-center">
                        <div class="flex justify-between w-full max-w-3xl items-center bg-slate-800 p-8 rounded-xl relative overflow-hidden">
                            <div class="text-center z-10 w-24">
                                <i class="fas fa-user text-5xl text-blue-400 mb-2"></i>
                                <p>Siz</p>
                            </div>
                            
                            <div class="flex-1 px-8 relative h-10 flex items-center justify-center border-y border-dashed border-slate-600">
                                <div id="https-msg" class="absolute left-0 bg-blue-500 text-white px-3 py-1 rounded text-sm transition-all duration-3000 ease-in-out opacity-0">Parol: 12345</div>
                                <i class="fas fa-user-secret text-4xl text-red-500 absolute bottom-12 opacity-50"></i>
                                <span class="absolute bottom-12 text-xs text-red-400">Xaker kuzatmoqda</span>
                            </div>

                            <div class="text-center z-10 w-24">
                                <i class="fas fa-server text-5xl text-emerald-400 mb-2"></i>
                                <p>Bank Server</p>
                            </div>
                        </div>
                        
                        <div class="mt-8 flex gap-4">
                            <button onclick="runHttpsSim('http')" class="px-6 py-3 bg-red-600 hover:bg-red-700 text-white rounded font-bold shadow-lg">HTTP da yuborish (Xavfli)</button>
                            <button onclick="runHttpsSim('https')" class="px-6 py-3 bg-emerald-600 hover:bg-emerald-700 text-white rounded font-bold shadow-lg flex items-center gap-2"><i class="fas fa-lock"></i> HTTPS da yuborish (Xavfsiz)</button>
                        </div>
                        <div id="https-status" class="mt-6 text-lg h-8"></div>
                    </div>
                    `;
                }
            },
            {
                id: 3, title: "3. HTTP", icon: "fa-globe",
                theory: `
                    <h3 class="text-xl font-bold text-blue-400 mb-2">HTTP (Hypertext Transfer Protocol)</h3>
                    <p class="mb-4 text-slate-300">Veb sahifalarni brauzeringizga olib keluvchi asosiy poydevor. HTTP so'rovlar matn ko'rinishida yuboriladi (shifrlanmagan).</p>
                    <div class="bg-slate-800 p-4 rounded-lg mt-4">
                        <h4 class="text-emerald-400 font-bold mb-2">Asosiy Metodlar:</h4>
                        <ul class="list-disc pl-5 text-sm text-slate-400">
                            <li><strong>GET:</strong> Ma'lumotni o'qish (sahifani ochish).</li>
                            <li><strong>POST:</strong> Yangi ma'lumot yuborish (ro'yxatdan o'tish, rasm yuklash).</li>
                            <li><strong>PUT/PATCH:</strong> Ma'lumotni yangilash.</li>
                            <li><strong>DELETE:</strong> Ma'lumotni o'chirish.</li>
                        </ul>
                    </div>
                    <div class="bg-slate-800 p-4 rounded-lg mt-4">
                        <h4 class="text-yellow-400 font-bold mb-2">Status Kodlar:</h4>
                        <p class="text-sm text-slate-400"><strong>200 OK</strong> (Hammasi zo'r), <strong>301</strong> (Boshqa joyga ko'chdi), <strong>404</strong> (Topilmadi), <strong>500</strong> (Serverda xatolik).</p>
                    </div>
                `,
                practice: `
                    <p class="mb-4 text-slate-300">Sof HTTP so'rov qanday ko'rinishga ega bo'ladi?</p>
                    <div class="bg-terminal p-4 rounded-lg shadow-lg font-mono text-sm code-block text-blue-300">
                        GET /index.html HTTP/1.1<br>
                        Host: www.example.com<br>
                        User-Agent: Mozilla/5.0<br>
                        Accept-Language: uz-UZ<br>
                        <br>
                        <span class="text-emerald-400">HTTP/1.1 200 OK<br>
                        Content-Type: text/html<br>
                        Content-Length: 138<br><br>
                        &lt;html&gt;&lt;body&gt;Salom Dunyo!&lt;/body&gt;&lt;/html&gt;</span>
                    </div>
                `,
                simFunc: () => {
                    return `
                    <div class="flex flex-col items-center max-w-3xl mx-auto w-full">
                        <h3 class="text-lg mb-4">Brauzer va Server o'rtasidagi muloqot</h3>
                        
                        <div class="w-full bg-white text-black rounded-t-lg border-b p-2 flex items-center gap-2">
                            <div class="flex gap-1"><div class="w-3 h-3 rounded-full bg-red-500"></div><div class="w-3 h-3 rounded-full bg-yellow-500"></div><div class="w-3 h-3 rounded-full bg-green-500"></div></div>
                            <div class="bg-slate-200 w-full rounded px-2 text-sm text-center flex items-center"><i class="fas fa-search text-slate-400 mr-2"></i>http://api.sayt.uz/users</div>
                        </div>
                        
                        <div class="w-full bg-slate-800 h-64 p-4 font-mono text-sm overflow-y-auto flex flex-col gap-2" id="http-log">
                            <div class="text-center text-slate-500 mb-4">So'rov yuborish uchun tugmalarni bosing</div>
                        </div>

                        <div class="grid grid-cols-4 gap-2 w-full mt-4">
                            <button onclick="httpSim('GET', 200)" class="bg-blue-600 hover:bg-blue-500 py-2 rounded font-bold">GET (200)</button>
                            <button onclick="httpSim('POST', 201)" class="bg-emerald-600 hover:bg-emerald-500 py-2 rounded font-bold">POST (201)</button>
                            <button onclick="httpSim('GET', 404)" class="bg-yellow-600 hover:bg-yellow-500 py-2 rounded font-bold">GET (404)</button>
                            <button onclick="httpSim('DELETE', 500)" class="bg-red-600 hover:bg-red-500 py-2 rounded font-bold">DELETE (500)</button>
                        </div>
                    </div>
                    `;
                }
            },
            {
                id: 4, title: "4. FTP (File Transfer Protocol)", icon: "fa-folder-open",
                theory: `
                    <h3 class="text-xl font-bold text-blue-400 mb-2">FTP (Fayl Uzatish Protokoli)</h3>
                    <p class="mb-4 text-slate-300">Klient va server o'rtasida fayllarni (rasm, video, kod) yuklash va tushirib olish uchun ishlatiladi. Portlari: <strong>20 (Data) va 21 (Boshqaruv)</strong>.</p>
                    <div class="bg-yellow-900/30 border border-yellow-700 p-4 rounded-lg mt-4 text-sm">
                        <i class="fas fa-exclamation-triangle text-yellow-500 mr-2"></i>
                        <strong>Muhim:</strong> Sof FTP ham xuddi HTTP kabi shifrlanmagan. Hozirgi kunda xavfsiz fayl uzatish uchun <strong>SFTP (SSH File Transfer Protocol)</strong> ishlatiladi.
                    </div>
                `,
                practice: `
                    <p class="mb-4 text-slate-300">Terminal0 orqali FTP serverga ulanish:</p>
                    <div class="bg-terminal p-4 rounded-lg shadow-lg font-mono text-sm code-block">
                        <span class="text-green-400">user@ubuntu:~$</span> ftp ftp.example.com<br>
                        <span class="text-slate-400">Connected to ftp.example.com.</span><br>
                        <span class="text-slate-400">Name (ftp.example.com:user): admin</span><br>
                        <span class="text-slate-400">Password: ******</span><br>
                        <span class="text-emerald-400">230 Login successful.</span><br>
                        <span class="text-blue-400">ftp></span> put index.html<br>
                        <span class="text-slate-400">226 Transfer complete.</span><br>
                    </div>
                `,
                simFunc: () => `
                    <div class="flex flex-col items-center w-full max-w-2xl mx-auto">
                        <div class="flex w-full gap-8 h-64">
                            <!-- Local PC -->
                            <div class="flex-1 bg-slate-800 rounded-lg p-4 flex flex-col border border-slate-700">
                                <h4 class="text-center font-bold mb-2 border-b border-slate-700 pb-2"><i class="fas fa-laptop mr-2"></i>Sizning PK</h4>
                                <div class="flex-1 flex flex-col gap-2 p-2">
                                    <div id="file-local" class="bg-blue-600 p-2 rounded cursor-pointer hover:bg-blue-500 flex items-center justify-between transition-all">
                                        <span><i class="fas fa-file-archive mr-2"></i>loyha.zip (50MB)</span>
                                        <button onclick="uploadFtp()" class="bg-white/20 px-2 py-1 rounded text-xs hover:bg-white/40"><i class="fas fa-arrow-right"></i></button>
                                    </div>
                                </div>
                            </div>

                            <!-- Server -->
                            <div class="flex-1 bg-slate-800 rounded-lg p-4 flex flex-col border border-slate-700">
                                <h4 class="text-center font-bold mb-2 border-b border-slate-700 pb-2"><i class="fas fa-server mr-2"></i>FTP Server</h4>
                                <div id="server-files" class="flex-1 flex flex-col gap-2 p-2 relative">
                                    <div class="bg-slate-700 p-2 rounded flex items-center text-slate-400"><i class="fas fa-folder mr-2"></i>/var/www/html</div>
                                    <!-- Progress bar overlay -->
                                    <div id="ftp-progress-container" class="hidden absolute inset-0 bg-slate-900/80 backdrop-blur-sm flex flex-col items-center justify-center rounded p-4">
                                        <div class="w-full bg-slate-700 rounded-full h-2.5 mb-2">
                                            <div id="ftp-progress" class="bg-blue-600 h-2.5 rounded-full transition-all duration-200" style="width: 0%"></div>
                                        </div>
                                        <span id="ftp-status" class="text-sm">Yuklanmoqda... 0%</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `
            },
            {
                id: 5, title: "5. SSH (Secure Shell)", icon: "fa-terminal",
                theory: `
                    <h3 class="text-xl font-bold text-blue-400 mb-2">SSH nima?</h3>
                    <p class="mb-4 text-slate-300">Uzoqdagi serverga xuddi uning oldida o'tirgandek, qora ekrandan (terminal) kirib boshqarish imkonini beruvchi protokoldir. Barcha buyruqlar va javoblar qattiq shifrlanadi.</p>
                    <div class="bg-slate-800 p-4 rounded-lg">
                        <h4 class="text-emerald-400 font-bold mb-2">SSH Kalitlar (Public / Private Keys):</h4>
                        <p class="text-sm text-slate-400">Parol yozib kirishdan ko'ra kalitlardan foydalanish xavfsizroq va qulayroq. Kompyuteringizda Maxfiy (Private) kalit saqlanadi, serverga esa Ochiq (Public) kalit qo'yiladi. Ular faqat bir-biriga tushadi (qulf va kalit kabi).</p>
                    </div>
                `,
                practice: `
                    <div class="bg-terminal p-4 rounded-lg shadow-lg font-mono text-sm code-block">
                        <span class="text-slate-500"># 1. SSH kalit yaratish</span><br>
                        <span class="text-green-400">local:~$</span> ssh-keygen -t rsa -b 4096<br><br>
                        
                        <span class="text-slate-500"># 2. Kalitni serverga nusxalash</span><br>
                        <span class="text-green-400">local:~$</span> ssh-copy-id root@192.168.1.50<br><br>

                        <span class="text-slate-500"># 3. Serverga parolsiz kirish (22-port)</span><br>
                        <span class="text-green-400">local:~$</span> ssh root@192.168.1.50<br>
                        <span class="text-emerald-400">Welcome to Ubuntu 22.04 LTS!</span><br>
                        <span class="text-purple-400">root@server:~#</span> <span class="animate-pulse">_</span>
                    </div>
                `,
                simFunc: () => `
                    <div class="w-full max-w-3xl mx-auto bg-[#1e1e1e] rounded-lg border border-slate-700 overflow-hidden shadow-2xl">
                        <div class="bg-slate-800 px-4 py-2 flex items-center gap-2 border-b border-slate-700">
                            <div class="w-3 h-3 rounded-full bg-red-500"></div><div class="w-3 h-3 rounded-full bg-yellow-500"></div><div class="w-3 h-3 rounded-full bg-green-500"></div>
                            <span class="text-xs text-slate-400 ml-2 font-mono">root@remote-server:~</span>
                        </div>
                        <div class="p-4 font-mono text-sm h-64 overflow-y-auto" id="ssh-terminal">
                            <div class="text-green-400">user@laptop:~$ <input type="text" id="ssh-input" class="bg-transparent border-none outline-none text-white w-64" placeholder="ssh root@192.168.0.10" onkeypress="handleSsh(event)"></div>

            arrow.classList.add('opacity-100', 'text-emerald-500');
            
            setTimeout(() => {
                document.getElementById('dns-record-ip').innerText = newIp;
                document.getElementById('dns-record-ip').classList.add('animate-pulse');
                setTimeout(() => {
                    arrow.classList.add('opacity-30');
                    arrow.classList.remove('text-emerald-500');
                    document.getElementById('dns-record-ip').classList.remove('animate-pulse');
                }, 1000);
            }, 1000);
        }

        // Sim 10: Nginx vs Apache
        function runServerSim(type) {
            const core = document.getElementById('sim-server-core');
            const title = document.getElementById('sim-server-title');
            core.innerHTML = '';
            
            if(type === 'apache') {
                title.innerHTML = '<span class="text-red-500">Apache Server</span>';
                // Create threads
                for(let i=1; i<=5; i++) {
                    setTimeout(() => {
                        const req = document.getElementById(`req-${i}`);
                        req.style.opacity = '1';
                        
                        const thread = document.createElement('div');
                        thread.className = `w-10 h-10 rounded border-2 flex items-center justify-center text-xs animate-pulse-border text-white`;
                        thread.style.backgroundColor = req.style.backgroundColor || ['#3b82f6','#10b981','#eab308','#a855f7','#ef4444'][i-1];
                        thread.innerText = `T${i}`;
                        core.appendChild(thread);
                        
                        setTimeout(()=> { req.style.opacity = '0'; }, 800);
                    }, i*400);
                }
            } else {
                title.innerHTML = '<span class="text-green-500">Nginx Server</span>';
                // Single event loop worker
                const worker = document.createElement('div');
                worker.className = "w-16 h-16 rounded-full border-4 border-green-500 flex items-center justify-center animate-spin text-white text-xs font-bold";
                worker.style.borderTopColor = 'transparent';
                worker.innerHTML = '<span style="animation: reverse-spin 1s infinite linear;">Worker</span>';
                core.appendChild(worker);
                
                let processed = 0;
                const counter = document.createElement('div');
                counter.className = "ml-4 font-bold text-green-400";
                counter.innerText = "0/5 Bajrilmoqda";
                core.appendChild(counter);

                for(let i=1; i<=5; i++) {
                    setTimeout(() => {
                        const req = document.getElementById(`req-${i}`);
                        req.style.opacity = '1';
                        req.style.left = '50px'; // move towards server
                        
                        setTimeout(() => {
                            req.style.opacity = '0';
                            req.style.left = '0px'; // reset
                            processed++;
                            counter.innerText = `${processed}/5 Bajarildi`;
                        }, 300);
                    }, i*200); // Much faster handling
                }
            }
        }

        // Sim 11: Reverse Proxy
        function runProxySim() {
            const area = document.getElementById('proxy-animation-area');
            const colors = ['bg-blue-500', 'bg-emerald-500', 'bg-purple-500'];
            
            for(let i=0; i<3; i++) {
                setTimeout(() => {
                    const packet = document.createElement('div');
                    packet.className = `absolute w-4 h-4 rounded-full ${colors[i]} shadow-lg z-20 transition-all duration-500 ease-in`;
                    
                    // Start from client
                    packet.style.left = '3rem';
                    packet.style.top = `${2 + (i*4)}rem`;
                    
                    area.appendChild(packet);
                    
                    // Move to Proxy
                    setTimeout(() => {
                        packet.style.left = '50%';
                        packet.style.top = '50%';
                        packet.style.transform = 'translate(-50%, -50%)';
                        
                        // Proxy distributes to Backends
                        setTimeout(() => {
                            packet.style.left = 'calc(100% - 4rem)';
                            // Randomly select backend
                            const targetIdx = Math.floor(Math.random() * 3);
                            packet.style.top = `${2 + (targetIdx*4)}rem`;
                            
                            // Visual indication on backend
                            setTimeout(() => {
                                document.getElementById(`rp-backend-${targetIdx+1}`).classList.add('bg-green-900/50');
                                packet.remove();
                                setTimeout(() => {
                                    document.getElementById(`rp-backend-${targetIdx+1}`).classList.remove('bg-green-900/50');
                                }, 300);
                            }, 500);

                        }, 400);
                    }, 50);
                }, i*300);
            }
        }

        // Sim 12: Cloudflare
        let cfActive = false;
        function toggleCloudflare() {
            cfActive = !cfActive;
            const shield = document.getElementById('cf-shield');
            
            if(cfActive) {
                shield.classList.replace('bg-orange-500', 'bg-emerald-500');
                shield.classList.add('shadow-[0_0_40px_rgba(16,185,129,0.8)]');
                document.getElementById('cf-attack-text').innerText = "Hujum To'sildi!";
                document.getElementById('cf-attack-text').classList.replace('text-red-500', 'text-slate-500');
            } else {
                shield.classList.replace('bg-emerald-500', 'bg-orange-500');
                shield.classList.remove('shadow-[0_0_40px_rgba(16,185,129,0.8)]');
                document.getElementById('cf-attack-text').innerText = "DDoS Hujum!";
                document.getElementById('cf-attack-text').classList.replace('text-slate-500', 'text-red-500');
            }
            runCfAttack();
        }

        function runCfAttack() {
            if(document.getElementById('cf-attack-area')) {
                const area = document.getElementById('cf-attack-area');
                const cpuBar = document.getElementById('cf-cpu-bar');
                area.innerHTML = '';
                
                let attackInterval = setInterval(() => {
                    if(!document.getElementById('cf-attack-area')) {
                        clearInterval(attackInterval); return;
                    }
                    
                    const p = document.createElement('div');
                    p.className = `absolute h-2 rounded-full w-8 ${cfActive ? 'bg-orange-500' : 'bg-red-500'} transition-all duration-1000 linear`;
                    p.style.left = '0%';
                    p.style.top = `${Math.random()*100}%`;
                    area.appendChild(p);
                    
                    setTimeout(() => {
                        if(cfActive) {
                            p.style.left = '50%'; // hits CF
                            setTimeout(() => p.remove(), 1000);
                            cpuBar.style.width = '10%';
                            cpuBar.className = "bg-green-500 h-full w-[10%] transition-all duration-300";
                        } else {
                            p.style.left = '100%'; // hits Server
                            setTimeout(() => p.remove(), 1000);
                            let currentW = parseInt(cpuBar.style.width) || 10;
                            if(currentW < 95) cpuBar.style.width = (currentW + 15) + '%';
                            if(currentW > 70) cpuBar.className = "bg-red-500 h-full transition-all duration-300";
                            else if(currentW > 40) cpuBar.className = "bg-yellow-500 h-full transition-all duration-300";
                        }
                    }, 50);
                }, 100);
                
                // Keep reference to stop if tab changed
                window.currentCfInterval = attackInterval;
            }
        }

        // Sim 17: Firewall
        let fwState = {80: false, 3306: false};
        function fwSimToggle(port) {
            fwState[port] = !fwState[port];
            const btnSpan = document.getElementById(`fw-btn-${port}`);
            const hole = document.getElementById(`fw-hole-${port}`);
            
            if(fwState[port]) {
                btnSpan.innerText = "Ochiq";
                btnSpan.classList.add("text-emerald-400");
                hole.classList.replace("bg-red-500", "bg-emerald-500");
            } else {
                btnSpan.innerText = "Yopiq";
                btnSpan.classList.remove("text-emerald-400");
                hole.classList.replace("bg-emerald-500", "bg-red-500");
            }
        }
        function fwSendTraffic() {
            ['user', 'hacker'].forEach(type => {
                const el = document.getElementById(`fw-${type}`);
                el.classList.add('translate-x-12');
                
                setTimeout(() => {
                    el.classList.remove('translate-x-12');
                    const port = type === 'user' ? 80 : 3306;
                    if(fwState[port]) {
                        el.style.backgroundColor = "rgba(16, 185, 129, 0.5)"; // success flash
                    } else {
                        el.style.backgroundColor = "rgba(239, 68, 68, 0.8)"; // block flash
                        // shake
                        el.classList.add('animate-bounce');
                        setTimeout(() => el.classList.remove('animate-bounce'), 500);
                    }
                    setTimeout(() => {
                        el.style.backgroundColor = type==='user' ? "rgba(30, 58, 138, 0.5)" : "rgba(127, 29, 29, 0.5)";
                    }, 500);
                }, 300);
            });
        }

        // Sim 19: Rate Limiting
        let rlClicks = 0;
        let rlTankValue = 0;
        function rlSimulateClick() {
            if(rlTankValue >= 100) return; // blocked
            
            rlClicks++;
            rlTankValue += 35; // 3 clicks fill the tank ~ 100%
            
            const tank = document.getElementById('rl-tank');
            tank.style.width = `${rlTankValue}%`;
            
            const status = document.getElementById('rl-server-status');
            
            if(rlTankValue >= 100) {
                // Trigger Ban
                tank.classList.replace('bg-blue-500', 'bg-red-500');
                status.className = "bg-red-500 text-white px-3 py-1 rounded text-sm font-bold inline-block";
                status.innerText = "429 XATO";
                
                document.getElementById('rl-msg').classList.remove('opacity-0');
                document.getElementById('rl-msg').classList.add('opacity-100', 'scale-110');
                
                const btn = document.getElementById('rl-btn');
                btn.classList.add('pointer-events-none', 'grayscale');
                
                // Cooldown
                setTimeout(() => {
                    rlTankValue = 0;
                    tank.style.width = '0%';
                    tank.classList.replace('bg-red-500', 'bg-blue-500');
                    status.className = "bg-green-500/20 text-green-400 border border-green-500 px-3 py-1 rounded text-sm inline-block";
                    status.innerText = "200 OK";
                    document.getElementById('rl-msg').classList.remove('opacity-100', 'scale-110');
                    document.getElementById('rl-msg').classList.add('opacity-0');
                    btn.classList.remove('pointer-events-none', 'grayscale');
                }, 3000);
            } else {
                // Slow drain
                setTimeout(() => {
                    if(rlTankValue > 0) {
                        rlTankValue -= 35;
                        tank.style.width = `${Math.max(0, rlTankValue)}%`;
                    }
                }, 1000);
            }
        }

        // Sim 20: Fail2Ban
        let f2bFails = 0;
        function f2bLogin() {
            const pass = document.getElementById('f2b-pass').value;
            const log = document.getElementById('f2b-log');
            
            if(pass === 'admin123') {
                log.innerHTML += `<div class="text-emerald-400">Accepted password for root from 192.168.1.10</div>`;
                document.getElementById('f2b-pass').value = '';
                f2bFails = 0;
            } else {
                f2bFails++;
                log.innerHTML += `<div class="text-red-400">Failed password for root (Urinish: ${f2bFails}/3)</div>`;
                
                if(f2bFails >= 3) {
                    setTimeout(() => {
                        log.innerHTML += `<div class="text-red-600 bg-red-900/50 font-bold p-1">Ban IP 192.168.1.10 triggered!</div>`;
                        document.getElementById('f2b-lock-screen').classList.remove('opacity-0', 'pointer-events-none');
                    }, 500);
                }
            }
        }
        function f2bReset() {
            f2bFails = 0;
            document.getElementById('f2b-log').innerHTML = '';
            document.getElementById('f2b-pass').value = '';
            document.getElementById('f2b-lock-screen').classList.add('opacity-0', 'pointer-events-none');
        }

        // Sim 21: Docker
        let dockerItems = [];
        function packDocker(item, elementId) {
            if(dockerItems.includes(item)) return; // already added
            dockerItems.push(item);
            
            const el = document.getElementById(elementId);
            el.classList.add('opacity-30', 'pointer-events-none'); // Disable original
            
            const copy = el.cloneNode(true);
            copy.classList.remove('opacity-30', 'cursor-pointer', 'flex-1');
            copy.className = "bg-slate-700/50 border border-slate-600 p-2 rounded text-center text-xs text-white transform scale-0 transition-transform duration-300";
            
            document.getElementById('docker-packed-items').appendChild(copy);
            setTimeout(() => copy.classList.remove('scale-0'), 50);
            
            if(dockerItems.length === 4) {
                setTimeout(() => {
                    document.getElementById('docker-logo-bg').classList.remove('text-blue-500/30');
                    document.getElementById('docker-logo-bg').classList.add('text-white/10');
                    document.getElementById('docker-success-msg').classList.remove('opacity-0', 'scale-50');
                }, 500);
            }
        }

        // Sim 22: Kubernetes
        function k8sScale(count) {
            const area = document.getElementById('k8s-pods-area');
            area.innerHTML = '';
            for(let i=0; i<count; i++) {
                setTimeout(() => {
                    const pod = document.createElement('div');
                    pod.className = "w-20 h-20 bg-blue-500/20 border-2 border-blue-500 rounded-lg flex flex-col items-center justify-center relative overflow-hidden pod-enter";
                    pod.innerHTML = `
                        <i class="fab fa-docker text-blue-400 text-2xl"></i>
                        <span class="text-[10px] mt-1">Pod-${i+1}</span>
                        <div class="absolute inset-0 bg-emerald-500 opacity-20 pointer-events-none pulse-bg"></div>
                    `;
                    area.appendChild(pod);
                }, i*200);
            }
        }

        // Sim 23: API / JWT
        let hasJwt = false;
        function jwtLogin() {
            const pkt = document.getElementById('jwt-packet');
            const msg = document.getElementById('jwt-server-msg');
            
            // Move packet to server
            pkt.classList.remove('hidden');
            pkt.style.transition = 'none';
            pkt.style.left = '0%';
            pkt.innerHTML = '<i class="fas fa-user"></i>';
            void pkt.offsetWidth;
            
            pkt.style.transition = 'all 1s ease-in-out';
            pkt.style.left = '100%';
            
            setTimeout(() => {
                msg.innerHTML = '<span class="text-emerald-400">Login to\'g\'ri! JWT Yaratildi.</span>';
                pkt.innerHTML = '<i class="fas fa-key"></i>';
                pkt.style.left = '0%'; // Return back
                
                setTimeout(() => {
                    pkt.classList.add('hidden');
                    hasJwt = true;
                    document.getElementById('jwt-token-display').innerText = "eyJhbGci...xMjM";
                    document.getElementById('jwt-token-display').classList.remove('opacity-30', 'text-yellow-400');
                    document.getElementById('jwt-token-display').classList.add('bg-emerald-900', 'text-emerald-400', 'border-emerald-500');
                    
                    document.getElementById('jwt-btn-data').classList.remove('opacity-50', 'cursor-not-allowed');
                    document.getElementById('jwt-btn-data').disabled = false;
                }, 1000);
            }, 1000);
        }

        function jwtGetData() {
            if(!hasJwt) return;
            const pkt = document.getElementById('jwt-packet');
            const msg = document.getElementById('jwt-server-msg');
            
            pkt.classList.remove('hidden');
            pkt.style.transition = 'none';
            pkt.style.left = '0%';
            pkt.innerHTML = '<i class="fas fa-key text-[8px]"></i><i class="fas fa-database text-[10px]"></i>';
            void pkt.offsetWidth;
            
            pkt.style.transition = 'all 1s ease-in-out';
            pkt.style.left = '100%';
            
            setTimeout(() => {
                msg.innerHTML = '<span class="text-blue-400">Token tekshirildi ✅<br>Ma\'lumot berildi.</span>';
                pkt.innerHTML = '<i class="fas fa-file-alt"></i>';
                pkt.style.left = '0%'; // Return back
                
                setTimeout(() => {
                    pkt.classList.add('hidden');
                    document.getElementById('jwt-token-display').innerText = "Ma'lumotlar keldi!";
                }, 1000);
            }, 1000);
        }

        // Start App
        window.onload = init;
    </script>
</body>
